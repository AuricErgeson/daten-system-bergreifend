site_name: Lernmaterialverwaltung
site_description: Dokumentation des LF8 Abschlussprojekts - Lernmaterialverwaltung
site_author: Auric Ergeson

theme:
  name: material
  language: de
  palette:
    primary: indigo
    accent: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [app]   # Hier liegen unsere Python-Dateien
          options:
            show_source: true          # Quellcode unter jeder Funktion anzeigen
            show_root_heading: true    # Modulname als Überschrift zeigen
            heading_level: 2           # Überschriften-Ebene
            docstring_style: google    # Format der Docstrings (Args:, Returns:, etc.)

nav:
  - Startseite: index.md
  - Code-Dokumentation:
    - Datenbankverbindung: api/database.md
    - Datenklassen: api/schemas.md
    - Datenbankoperationen: api/services.md
    - CLI-Befehle: api/cli.md
  - Datenbankschema: schema.md
